<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#00e676;--card:rgba(255,255,255,0.04);
  --border:rgba(0,230,118,0.15);--text:#f0faf4;
  --muted:rgba(240,250,244,0.5);--danger:#ff5252;
}
html,body{width:100%;height:100%;background:#060f09;overflow:hidden}
.app{
  font-family:'Syne',sans-serif;
  background:linear-gradient(145deg,#0a2e1a 0%,#051a0e 50%,#071f12 100%);
  width:100vw;height:100vh;color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;position:relative;overflow:hidden;
}
.app::before{
  content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);
  width:800px;height:800px;
  background:radial-gradient(circle,rgba(0,230,118,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.card{
  background:rgba(10,46,26,0.7);border:1px solid var(--border);
  border-radius:32px;padding:40px 48px;width:100%;max-width:580px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 80px rgba(0,230,118,0.05),0 40px 100px rgba(0,0,0,0.5);
  position:relative;
}
.title{
  font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);margin-bottom:36px;display:flex;align-items:center;gap:10px;
}
.title::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
@keyframes spin{to{transform:rotate(360deg)}}
.amount-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.amount-left{display:flex;align-items:baseline;gap:8px}
.symbol{font-size:26px;font-weight:400;color:var(--muted)}
.amount-input{
  font-family:'JetBrains Mono',monospace;font-size:60px;font-weight:500;
  background:transparent;border:none;outline:none;color:var(--text);
  width:250px;caret-color:var(--accent);
  -webkit-tap-highlight-color:transparent;
}
.currency-select{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,230,118,0.08);border:1px solid var(--border);
  border-radius:16px;padding:12px 18px;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);
  min-width:140px;position:relative;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;
}
.currency-select:active{background:rgba(0,230,118,0.18);transform:scale(0.96)}
.currency-select select{
  position:absolute;inset:0;opacity:0;font-size:18px;cursor:pointer;
  width:100%;height:100%;
}
.flag{font-size:24px}.code{font-size:14px;font-weight:700;letter-spacing:1px}
.chev{color:var(--muted);font-size:11px;margin-left:auto}
.swap-row{display:flex;align-items:center;gap:14px;margin:18px 0}
.divider{flex:1;height:1px;background:var(--border)}
.swap-btn{
  width:48px;height:48px;border-radius:50%;background:rgba(0,230,118,0.1);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;transition:all 0.25s;color:var(--accent);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.swap-btn:active{background:rgba(0,230,118,0.3);transform:rotate(180deg) scale(0.9)}
.result-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.result-num{
  font-family:'JetBrains Mono',monospace;font-size:52px;font-weight:500;
  color:var(--accent);transition:all 0.3s;
}
.rate-info{
  font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:28px;
  font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:10px;
}
.rate-change{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:700}
.rate-change.up{background:rgba(0,230,118,0.15);color:var(--accent)}
.rate-change.down{background:rgba(255,82,82,0.15);color:var(--danger)}
.quick-amounts{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.quick-btn{
  padding:8px 18px;border-radius:24px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);color:var(--muted);
  font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quick-btn:active{background:rgba(0,230,118,0.12);color:var(--accent);border-color:var(--border);transform:scale(0.94)}
.tabs{
  display:flex;background:rgba(0,0,0,0.35);border-radius:16px;padding:4px;
  margin-bottom:22px;border:1px solid rgba(255,255,255,0.05);
}
.tab{
  flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;
  letter-spacing:0.5px;cursor:pointer;border-radius:12px;transition:all 0.2s;
  color:var(--muted);-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;
}
.tab.active{background:rgba(0,230,118,0.15);color:var(--accent);border:1px solid rgba(0,230,118,0.2)}
.chart-wrap{position:relative;height:180px}
canvas#chartCanvas{width:100%!important;height:180px!important}
.x-labels{
  display:flex;justify-content:space-between;font-size:11px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;margin-top:8px;padding:0 4px;
}
.loading-overlay{
  position:absolute;inset:0;background:rgba(5,26,14,0.9);border-radius:32px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--accent);letter-spacing:2px;z-index:10;
  transition:opacity 0.3s;backdrop-filter:blur(4px);
}
.spinner{
  width:22px;height:22px;border:2px solid rgba(0,230,118,0.2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;margin-right:12px;
}
.error-msg{color:var(--danger);font-size:12px;text-align:center;margin-top:10px;display:none}
.footer-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:22px;padding-top:16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  display:inline-block;margin-right:6px;animation:pulse 1.5s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="app">
  <div class="card" id="mainCard">
    <div class="loading-overlay" id="loader">
      <div class="spinner"></div>
      <span>جاري التحميل...</span>
    </div>
    <div class="title">Currency Converter</div>
    <div class="amount-row">
      <div class="amount-left">
        <span class="symbol" id="fromSymbol">$</span>
        <input class="amount-input" type="number" id="amountInput" value="800" min="0" step="any"/>
      </div>
      <div class="currency-select">
        <span class="flag" id="fromFlag">🇺🇸</span>
        <span class="code" id="fromCode">USD</span>
        <span class="chev">▾</span>
        <select id="fromSelect"></select>
      </div>
    </div>
    <div class="swap-row">
      <div class="divider"></div>
      <button class="swap-btn" id="swapBtn">⇅</button>
      <div class="divider"></div>
    </div>
    <div class="result-row">
      <div class="amount-left">
        <span class="symbol" id="toSymbol">¥</span>
        <span class="result-num" id="resultNum">—</span>
      </div>
      <div class="currency-select">
        <span class="flag" id="toFlag">🇯🇵</span>
        <span class="code" id="toCode">JPY</span>
        <span class="chev">▾</span>
        <select id="toSelect"></select>
      </div>
    </div>
    <div class="rate-info" id="rateInfo">
      <span id="rateText">جاري التحديث...</span>
      <span class="rate-change up" id="rateChange" style="display:none"></span>
    </div>
    <div class="quick-amounts">
      <button class="quick-btn" data-val="100">100</button>
      <button class="quick-btn" data-val="500">500</button>
      <button class="quick-btn" data-val="1000">1K</button>
      <button class="quick-btn" data-val="5000">5K</button>
      <button class="quick-btn" data-val="10000">10K</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-period="7">أسبوع</div>
      <div class="tab" data-period="30">شهر</div>
      <div class="tab" data-period="365">سنة</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chartCanvas"></canvas>
    </div>
    <div class="x-labels" id="xLabels"></div>
    <div class="error-msg" id="errMsg">⚠ تعذّر جلب البيانات — يُعرض آخر سعر محفوظ</div>
    <div class="footer-row">
      <span><span class="live-dot"></span>معدّل مباشر</span>
      <span id="lastUpdate">—</span>
    </div>
  </div>
</div>
<script>
const CURRENCIES=[
  {code:'USD',name:'US Dollar',flag:'🇺🇸',symbol:'$'},
  {code:'EUR',name:'Euro',flag:'🇪🇺',symbol:'€'},
  {code:'GBP',name:'British Pound',flag:'🇬🇧',symbol:'£'},
  {code:'JPY',name:'Japanese Yen',flag:'🇯🇵',symbol:'¥'},
  {code:'EGP',name:'Egyptian Pound',flag:'🇪🇬',symbol:'ج.م'},
  {code:'SAR',name:'Saudi Riyal',flag:'🇸🇦',symbol:'﷼'},
  {code:'AED',name:'UAE Dirham',flag:'🇦🇪',symbol:'د.إ'},
  {code:'KWD',name:'Kuwaiti Dinar',flag:'🇰🇼',symbol:'د.ك'},
  {code:'CHF',name:'Swiss Franc',flag:'🇨🇭',symbol:'CHF'},
  {code:'CNY',name:'Chinese Yuan',flag:'🇨🇳',symbol:'¥'},
  {code:'CAD',name:'Canadian Dollar',flag:'🇨🇦',symbol:'C$'},
  {code:'AUD',name:'Australian Dollar',flag:'🇦🇺',symbol:'A$'},
  {code:'INR',name:'Indian Rupee',flag:'🇮🇳',symbol:'₹'},
  {code:'TRY',name:'Turkish Lira',flag:'🇹🇷',symbol:'₺'},
  {code:'MXN',name:'Mexican Peso',flag:'🇲🇽',symbol:'$'},
  {code:'BRL',name:'Brazilian Real',flag:'🇧🇷',symbol:'R$'},
  {code:'KRW',name:'South Korean Won',flag:'🇰🇷',symbol:'₩'},
  {code:'SGD',name:'Singapore Dollar',flag:'🇸🇬',symbol:'S$'},
  {code:'HKD',name:'Hong Kong Dollar',flag:'🇭🇰',symbol:'HK$'},
  {code:'NOK',name:'Norwegian Krone',flag:'🇳🇴',symbol:'kr'},
  {code:'SEK',name:'Swedish Krona',flag:'🇸🇪',symbol:'kr'},
  {code:'QAR',name:'Qatari Riyal',flag:'🇶🇦',symbol:'ر.ق'},
  {code:'BHD',name:'Bahraini Dinar',flag:'🇧🇭',symbol:'BD'},
  {code:'OMR',name:'Omani Rial',flag:'🇴🇲',symbol:'ر.ع'},
  {code:'MAD',name:'Moroccan Dirham',flag:'🇲🇦',symbol:'MAD'},
  {code:'JOD',name:'Jordanian Dinar',flag:'🇯🇴',symbol:'JD'},
];
let fromCurrency='USD',toCurrency='JPY',currentRate=null,prevRate=null,chartPeriod=7;
let ratesCache={},historyCache={};

function getCurrencyInfo(code){return CURRENCIES.find(c=>c.code===code)||{code,flag:'🌐',symbol:code,name:code}}

function populateSelects(){
  ['fromSelect','toSelect'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML='';
    CURRENCIES.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.code;opt.text=`${c.flag} ${c.code} — ${c.name}`;
      sel.appendChild(opt);
    });
  });
  document.getElementById('fromSelect').value=fromCurrency;
  document.getElementById('toSelect').value=toCurrency;
}

function updateCurrencyUI(){
  const fc=getCurrencyInfo(fromCurrency),tc=getCurrencyInfo(toCurrency);
  document.getElementById('fromFlag').textContent=fc.flag;
  document.getElementById('fromCode').textContent=fc.code;
  document.getElementById('fromSymbol').textContent=fc.symbol;
  document.getElementById('toFlag').textContent=tc.flag;
  document.getElementById('toCode').textContent=tc.code;
  document.getElementById('toSymbol').textContent=tc.symbol;
  document.getElementById('fromSelect').value=fromCurrency;
  document.getElementById('toSelect').value=toCurrency;
}

async function fetchRate(from,to){
  const key=`${from}_${to}`;
  if(ratesCache[key]&&Date.now()-ratesCache[key].time<60000)return ratesCache[key].rate;
  const res=await fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`);
  if(!res.ok)throw new Error('API error');
  const data=await res.json();
  const rate=data.rates[to];
  ratesCache[key]={rate,time:Date.now()};
  return rate;
}

async function fetchHistory(from,to,days){
  const key=`${from}_${to}_${days}`;
  if(historyCache[key]&&Date.now()-historyCache[key].time<300000)return historyCache[key].data;
  const end=new Date(),start=new Date();
  start.setDate(start.getDate()-days);
  const fmt=d=>d.toISOString().split('T')[0];
  const res=await fetch(`https://api.frankfurter.app/${fmt(start)}..${fmt(end)}?from=${from}&to=${to}`);
  if(!res.ok)throw new Error('History error');
  const data=await res.json();
  const result=Object.entries(data.rates).map(([date,r])=>({date,rate:r[to]}));
  historyCache[key]={data:result,time:Date.now()};
  return result;
}

function formatNum(n){
  if(n>=1000000)return(n/1000000).toFixed(2)+'M';
  if(n>=10000)return n.toLocaleString('en-US',{maximumFractionDigits:0});
  if(n>=100)return n.toFixed(2);
  return n.toFixed(4);
}

function convert(){
  if(!currentRate)return;
  const amount=parseFloat(document.getElementById('amountInput').value)||0;
  document.getElementById('resultNum').textContent=formatNum(amount*currentRate);
}

function drawChart(data){
  const canvas=document.getElementById('chartCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=180*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=180,pad={top:16,right:16,bottom:8,left:16};
  ctx.clearRect(0,0,W,H);
  if(!data||data.length<2)return;
  const rates=data.map(d=>d.rate);
  const minR=Math.min(...rates),maxR=Math.max(...rates),range=maxR-minR||1;
  const toX=i=>pad.left+(i/(data.length-1))*(W-pad.left-pad.right);
  const toY=r=>pad.top+(1-(r-minR)/range)*(H-pad.top-pad.bottom);
  ctx.beginPath();
  ctx.moveTo(toX(0),H-pad.bottom);
  data.forEach((d,i)=>ctx.lineTo(toX(i),toY(d.rate)));
  ctx.lineTo(toX(data.length-1),H-pad.bottom);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.top,0,H);
  grad.addColorStop(0,'rgba(0,230,118,0.22)');
  grad.addColorStop(1,'rgba(0,230,118,0.0)');
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();
  data.forEach((d,i)=>{i===0?ctx.moveTo(toX(i),toY(d.rate)):ctx.lineTo(toX(i),toY(d.rate))});
  ctx.strokeStyle='#00e676';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
  const lx=toX(data.length-1),ly=toY(data[data.length-1].rate);
  ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fillStyle='#00e676';ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,10,0,Math.PI*2);ctx.fillStyle='rgba(0,230,118,0.2)';ctx.fill();
  ctx.setLineDash([3,7]);ctx.strokeStyle='rgba(0,230,118,0.1)';ctx.lineWidth=1;
  for(let i=1;i<4;i++){const y=pad.top+(i/4)*(H-pad.top-pad.bottom);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();}
  ctx.setLineDash([]);
  const xLabels=document.getElementById('xLabels');
  let labelDates=[];
  if(data.length<=7)labelDates=data.map(d=>d.date);
  else{const step=Math.floor(data.length/6);for(let i=0;i<data.length;i+=step)labelDates.push(data[i].date);}
  xLabels.innerHTML=labelDates.map(d=>{const dt=new Date(d);return`<span>${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;}).join('');
}

async function refresh(){
  const loader=document.getElementById('loader');
  const errMsg=document.getElementById('errMsg');
  loader.style.display='flex';errMsg.style.display='none';
  try{
    prevRate=currentRate;
    currentRate=await fetchRate(fromCurrency,toCurrency);
    convert();
    document.getElementById('rateText').textContent=`1 ${fromCurrency} = ${currentRate.toFixed(4)} ${toCurrency}`;
    const rateChange=document.getElementById('rateChange');
    if(prevRate!==null){
      const diff=((currentRate-prevRate)/prevRate*100).toFixed(3);
      const up=currentRate>=prevRate;
      rateChange.textContent=`${up?'▲':'▼'} ${Math.abs(diff)}%`;
      rateChange.className=`rate-change ${up?'up':'down'}`;
      rateChange.style.display='inline';
    }
    document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
    const histData=await fetchHistory(fromCurrency,toCurrency,chartPeriod);
    drawChart(histData);
  }catch(e){
    errMsg.style.display='block';
    if(currentRate)convert();
  }finally{loader.style.display='none';}
}

document.getElementById('amountInput').addEventListener('input',convert);
document.getElementById('fromSelect').addEventListener('change',e=>{fromCurrency=e.target.value;updateCurrencyUI();refresh();});
document.getElementById('toSelect').addEventListener('change',e=>{toCurrency=e.target.value;updateCurrencyUI();refresh();});
document.getElementById('swapBtn').addEventListener('click',()=>{[fromCurrency,toCurrency]=[toCurrency,fromCurrency];updateCurrencyUI();refresh();});
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');chartPeriod=parseInt(tab.dataset.period);refresh();
  });
});
document.querySelectorAll('.quick-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.getElementById('amountInput').value=btn.dataset.val;convert();});
});
populateSelects();updateCurrencyUI();refresh();
setInterval(refresh,60000);
</script>
</body>
</html>
